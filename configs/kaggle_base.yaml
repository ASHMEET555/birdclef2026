# Kaggle-specific configuration for BirdCLEF 2026
# This config is designed for Kaggle kernel execution with competition data paths
# Usage: python src/train.py --config configs/kaggle_base.yaml --fold 0

_base: "base_config.yaml"

# Kaggle data paths (competition + dataset inputs)
paths:
  # Competition data
  base: "/kaggle/input/competitions/birdclef-2026"
  train_audio: "/kaggle/input/competitions/birdclef-2026/train_audio"
  # Some BirdCLEF dumps use train.csv, others use train_metadata.csv
  train_meta: "/kaggle/input/competitions/birdclef-2026/train.csv"
  train_meta_alt: "/kaggle/input/competitions/birdclef-2026/train_metadata.csv"
  taxonomy: "/kaggle/input/competitions/birdclef-2026/taxonomy.csv"
  train_soundscapes: "/kaggle/input/competitions/birdclef-2026/train_soundscapes"
  train_sc_labels: "/kaggle/input/competitions/birdclef-2026/train_soundscapes_labels.csv"
  test_soundscapes: "/kaggle/input/competitions/birdclef-2026/test_soundscapes"

  # Precomputed dataset (mounted as a separate Kaggle dataset)
  # Expected layout: /kaggle/input/birdclef-precompute/precomputed/{metadata,label_vectors,...}
  precomputed: "/kaggle/input/datasets/ashmeet555/birdclef-precompute/precomputed"

  # Optional split-mount fallback if you publish precomputed assets in two datasets.
  # Current code uses only `precomputed`; these are documented for notebook-side checks.
  precomputed_metadata: "/kaggle/input/datasets/ashmeet555/birdclef-precompute/precomputed/metadata"
  precomputed_label_vectors: "/kaggle/input/datasets/ashmeet555/birdclef-precompute/precomputed/label_vectors"

  # Working directory outputs
  checkpoints: "/kaggle/working/checkpoints"
  output: "/kaggle/working/outputs"
  experiments: "/kaggle/working/experiments"

# Kaggle-specific training overrides
training:
  batch_size: 64  # Full Kaggle GPU capacity
  num_workers: 4

# Kaggle-specific settings
kaggle:
  enabled: true
  save_artifacts: true  # Save models/logs to /kaggle/working
  internet_enabled: false  # Assumes no internet in Kaggle kernel